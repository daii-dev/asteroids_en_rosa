<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Asteroids</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="contenedorJuego">
    <h1 class="titulo">Asteroids</h1>
    <div id="panelInfo">
      <span>Puntos: <strong id="marcador">0</strong></span>
      <span>Vidas: <strong id="vidas">3</strong></span>
      <span>Nivel: <strong id="nivel">1</strong></span>
    </div>

    <canvas id="areaJuego"></canvas>

    <div id="modalInicio" class="modal">
      <h2>BIENVENIDA A ASTEROIDS: Pink Edition</h2>
      <p>Destruye todos los asteroides y sobrevive</p>
      <div class="controles">
        <h2>Controles</h2>
        <p>Flecha arriba: Impulso</p>
        <p>Flechas laterales: Girar</p>
        <p>Espacio: Disparar</p>
      </div>
      <button id="botonjugar" class="botonrosa">Jugar</button>
    </div>

    <div id="modalGameover" class="modal oculto">
      <h2>Game Over</h2>
      <p>Puntuación final: <strong id="puntajeFinal">0</strong></p>
      <button id="botonreiniciar" class="botonrosa">Intentar de nuevo</button>
    </div>

    <div id="modalNivel" class="modal oculto">
      <h2>Nivel superado</h2>
      <p id="textoNivelnuevo"></p>
    </div>
  </div>
  <script src="js/nave.js"></script>
  <script src="js/balas.js"></script>
  <script src="js/asteroides.js"></script>
  <script src="js/colisiones.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
